{{- if .Values.ingress.enabled}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{.Values.prefix}}-ingress
  namespace: {{.Values.namespace}}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.ingress.entrypoint}}
spec:
  rules:
    - host: {{ .Values.ingress.host}}
      http:
        paths:
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: nginx-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: django-web
                port:
                  number: 9000
{{- end}}