{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Komuna Baratza{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'boleto/css/ticket.css' %}?v=2">
    <style>
      /* Inline overrides to ensure layout styling is visible immediately */
      body { background: #f6f7f9; }
      header.bg-white { background: linear-gradient(180deg,#ffffff 0%, #fbfbfb 100%); border-bottom: 1px solid #eee; }
      .navbar-brand { font-weight: 800; color: #0b2b2b; }
      .nav-link { color: #375a7f !important; font-weight: 600; padding: 8px 12px; border-radius: 8px; }
      .nav-link:hover { background: rgba(55,90,127,0.06); }
    </style>
  </head>
  <body>
    <header class="bg-white shadow-sm">
      <nav class="container py-2 d-flex align-items-center">
        <div class="me-auto d-flex align-items-center">
          <a class="navbar-brand fw-bold text-dark" href="/">Komuna Baratza</a>
        </div>
        <ul class="nav">
          {% for item in menu_items %}
            {% url 'boleto:page' item.slug as item_url %}
            <li class="nav-item">
              <a class="nav-link px-3" href="{{ item_url }}">{{ item.name }}</a>
            </li>
          {% endfor %}
        </ul>
      </nav>
    </header>
    
    <!-- Site banner (hero) -->
    <div class="site-banner hero">
      <img src="{% static 'boleto/images/banner_huerta_urban.jpg' %}" alt="Komuna Baratza" class="banner-image hero-image">
      <div class="hero-overlay">
        <h2 class="banner-title">Sorteo Komuna Baratza</h2>
      </div>
    </div>

    <main class="container py-4">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="container d-flex align-items-center justify-content-start">
        <img src="{% static 'boleto/images/goteo.jpeg' %}" alt="Komuna Baratza" class="footer-logo">
        <span class="text-muted small">&copy; {{ now.year }} Komuna Baratza</span>
      </div>
    </footer>
  </body>
</html>
