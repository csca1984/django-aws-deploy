name: CI/CD Docker to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # copiamos el repo
    - name: Checkout repo
      uses: actions/checkout@v3

    # configuramos AWS CLI
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-west-1

    ## Login a ECR
    - name: Login to Amazon ECR
      id: login-ecr
      run: |
        aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin 154712418645.dkr.ecr.eu-west-1.amazonaws.com

    - name: Build Push Docker image via to ECR
      run: |
        chmod +x Docker/aws/compilar_docker_aws.sh
        ./Docker/aws/compilar_docker_aws.sh
    
    - name: Copy files to EC2
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        # Crear el directorio remoto si no existe
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ec2-user@${{ secrets.EC2_HOST }} "mkdir -p /home/ec2-user/app/"
    
        scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa docker-compose.yml ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/app/
        scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa nginx.conf ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/app/
        scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa .env ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/app/

    - name: Deploy Docker Compose in EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          cd /home/ec2-user/app
          aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin 154712418645.dkr.ecr.eu-west-1.amazonaws.com
          docker-compose pull
          docker-compose up -d --build



