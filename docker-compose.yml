services:
  web:
    image: 154712418645.dkr.ecr.eu-west-1.amazonaws.com/django-app:1.0.0
    container_name: django_boleto
    restart: unless-stopped
    #command: gunicorn boleto_enriquecido.wsgi:application --bind 0.0.0.0:9000
    #entrypoint: ["/app/entrypoint.sh"]
    volumes:
      #- .:/app
      - static_volume:/app/static
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
    depends_on:
      - db
    ports:
      - "9000:9000"
    networks:
      - backend

  db:
    image: postgres:15
    container_name: postgres_boleto
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend    
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  nginx:
    image: nginx:latest
    restart: unless-stopped
    container_name: nginx_boleto
    ports:
      - "8090:80"
    networks:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/static
    depends_on:
      - web

volumes:
  static_volume:
networks:
  backend:
    driver: bridge
